<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="popup.css">
    </head>
    <body>
        <h2>MonkeyTyper</h2>

        <div class="status-container">
            <div class="indicator" id="indicator"></div>
            <span id="statusText">Disabled</span>
        </div>
        
        <div class="slider-container">
            <label>Speed</label>
            <input type="range" id="speedSlider" class="value-slider" min="0" max="4" step="1" value="2">
            <span id="speedLabel" class="slider-label">Medium</span>
        </div>
        <div class="slider-container">
            <label>Accuracy</label>
            <input type="range" id="accuracySlider" class="value-slider" min="0" max="3" step="1" value="3">
            <span id="accuracyLabel" class="slider-label">Perfect</span>
        </div>

        <button id="toggleBtn">
            Toggle Bot
        </button>

        <script src="popup.js"></script>
    </body>
</html>
